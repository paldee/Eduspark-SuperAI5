        <style>
        html, body {
            height: 100%; /* Ensures html and body take up full viewport height */
            margin: 0;
            padding: 0;
          }
          body {
            display: flex; /* Enables flexbox for the body */
            flex-direction: column; /* Stacks children vertically */
          }
          /* Ensures the navbar keeps its height and doesn't shrink */
          .navbar {
            flex-shrink: 0; 
            padding-top: 1rem; /* Added padding to top */
            padding-bottom: 1rem; /* Added padding to bottom */
          }

          /* Custom styles for the dropdown menu */
          .dropdown-menu {
            background-color: #2a2a3d; /* Darker background for the dropdown */
            border: none; /* Remove default border */
            border-radius: 0.75rem; /* Rounded corners */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4); /* Subtle shadow for depth */
            padding: 0.5rem 0; /* Adjust vertical padding */
          }

          .dropdown-item {
            color: #e0e0e0; /* Light text color for items */
            padding: 0.75rem 1.25rem; /* More generous padding */
            transition: background-color 0.2s ease, color 0.2s ease; /* Smooth transitions */
          }

          .dropdown-item:hover,
          .dropdown-item:focus {
            background-color: #3f3f5a; /* Slightly lighter background on hover/focus */
            color: #ffffff; /* White text on hover/focus */
            border-radius: 0.5rem; /* Slight rounded corners on hover */
            margin: 0 0.5rem; /* Add horizontal margin to make hover effect contained */
          }

          .dropdown-item.active {
            background-color: #007bff !important; /* Primary blue for active item */
            color: #ffffff !important;
            border-radius: 0.5rem;
            margin: 0 0.5rem;
          }

          .dropdown-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.1); /* Lighter divider */
            margin: 0.5rem 0;
          }

          .dropdown-item.text-danger:hover {
            background-color: #dc3545 !important; /* Red background for danger item on hover */
            color: #ffffff !important;
          }

          /* Navbar Brand Enhancements */
          .navbar-brand {
            transition: transform 0.2s ease;
          }
          .navbar-brand:hover {
            transform: scale(1.05); /* Slightly enlarge on hover */
          }
          .navbar-brand strong {
            font-weight: 700; /* Ensure brand text is bold */
            font-size: 1.25rem; /* Slightly larger brand text */
          }

          /* Nav Link Enhancements */
          .navbar-nav .nav-link {
            position: relative;
            padding-left: 1rem;
            padding-right: 1rem;
            transition: color 0.2s ease, background-color 0.2s ease;
            color: #b0b0b0; /* Default link color */
            font-weight: 500;
          }

          .navbar-nav .nav-link:hover {
            color: #ffffff; /* White on hover */
            background-color: rgba(255, 255, 255, 0.05); /* Subtle background on hover */
            border-radius: 0.5rem;
          }

          .navbar-nav .nav-link.active {
            color: #ffffff; /* White for active link */
            font-weight: 600;
            background-color: rgba(0, 123, 255, 0.1); /* Light blue tint for active */
            border-radius: 0.5rem;
          }

          /* Active link indicator (bottom border) */
          .navbar-nav .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -5px; /* Position below the link */
            left: 50%;
            transform: translateX(-50%);
            width: 70%; /* Width of the indicator */
            height: 3px; /* Thickness of the indicator */
            background-color: #007bff; /* Primary blue color */
            border-radius: 2px;
          }
